<body>
    <h1>Spiced Tortilla</h1>
    <img src="/img/spicedTortilla.webp" alt="Spiced Tortilla sliced into 3 slices on a white chopping board">
    <ul>
        <li>1 tbsp sunflower oil</li>
        <li>1 onion, sliced</li>
        <li>1 red chilli, deseeded and shredded</li>
        <li>2 tsp curry spice</li>
        <li>300g cherry tomato</li>
        <li>500g cooked potato, sliced</li>
        <li>bunch coriander, stalks finely chopped, leaves roughly chopped</li>
        <li>8 eggs, beaten</li>
    </ul>
